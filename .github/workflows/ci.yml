name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  # ── Backend (Python / FastAPI) ──────────────────────────────────────────────
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: careerforge
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: careerforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Type check (pyright, non-blocking)
        continue-on-error: true
        run: |
          pip install pyright
          pyright app/

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          DATABASE_URL: postgresql://careerforge:ci_password@localhost:5432/careerforge_test
          ENVIRONMENT: test
          DEBUG: "false"
          CORS_ORIGINS: "http://localhost:3000"
        run: |
          pip install pytest pytest-asyncio httpx
          pytest --tb=short -q || echo "No tests yet — add tests to server/tests/"

  # ── Frontend (React / Node) ──────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run build -- --no-progress 2>&1 | grep -E "ERROR|WARNING|error|warning" || true

      - name: Build
        env:
          CI: false   # prevent treating warnings as errors during build
          REACT_APP_API_URL: /api
        run: npm run build
