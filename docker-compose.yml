# Docker Compose — Career Forge
#
# Usage:
#   Self-hosted:  docker compose up --build
#   Stop:               docker compose down
#   Reset:              docker compose down -v
#
# Create a .env file with required variables — see docs/deployment.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: careerforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - careerforge_postgres_data:/var/lib/postgresql/data
    networks:
      - careerforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: careerforge-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - careerforge_redis_data:/data
    networks:
      - careerforge-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: careerforge-backend
    restart: unless-stopped
    environment:
      # App
      APP_NAME: ${APP_NAME:-Career Forge API}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY}
      # Database — connects via Docker service name
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Redis — connects via Docker service name
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RATE_LIMIT_BACKEND: redis
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      # JWT
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # Security
      ENFORCE_HTTPS: ${ENFORCE_HTTPS:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    volumes:
      - careerforge_backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - careerforge-network
    # Port is NOT exposed publicly — only accessible via Nginx
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # At build time, point the React app at /api (Nginx will proxy it)
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        # Cloud feature flags disabled by default
        REACT_APP_GDPR: ${REACT_APP_GDPR:-false}
    container_name: careerforge-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - careerforge-network

volumes:
  careerforge_postgres_data:
    driver: local
  careerforge_redis_data:
    driver: local
  careerforge_backend_uploads:
    driver: local

networks:
  careerforge-network:
    driver: bridge
