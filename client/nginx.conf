# ============================================================
# Nginx config — serves Career Forge React SPA + proxies /api to backend
# ============================================================

upstream backend {
    server backend:8000;
}

# Only send "Connection: upgrade" when the client actually requests an upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- Security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- Gzip — handled in http context (see Dockerfile) ----------

    # ---------- Proxy /api to FastAPI backend ----------
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (future-proof)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---------- Proxy /uploads to backend ----------
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Static assets with long cache ----------
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------- React SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Deny hidden files ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---------- Client body size (for uploads) ----------
    client_max_body_size 10M;
}
